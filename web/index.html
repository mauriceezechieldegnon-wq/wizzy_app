<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="WIZZY - Super App">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="wizzy">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- ID GOOGLE (Remplace avec ton vrai ID si celui-ci est faux) -->
  <meta name="google-signin-client_id" content="TON_ID_CLIENT.apps.googleusercontent.com">

  <title>WIZZY</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          // On désactive le service worker en dév pour éviter les bugs de cache IDX
          serviceWorkerVersion: null, 
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
