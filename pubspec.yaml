name: wizzy
description: "WIZZY Super App - Quiz & Marketplace"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.10.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  google_sign_in: ^6.2.1  # ON REVIENT À LA VERSION 6 (Indispensable pour ton code)
  google_generative_ai: ^0.4.7 # Version stable pour le Génie
  font_awesome_flutter: ^10.7.0
  url_launcher: ^6.3.0
  share_plus: ^10.1.4
  image_picker: ^1.1.0
  http: ^1.6.0
  audioplayers: ^6.6.0
  confetti: ^0.8.0
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/ 
    
flutter_launcher_icons:
  android: true
  ios: true
  macos: true 
  windows: 
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 256
  image_path: "assets/images/logo.png"


  